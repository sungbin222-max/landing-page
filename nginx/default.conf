# HTTP → HTTPS redirect
server {
    listen 80;
    server_name sbahn.cloud;

    # Let's Encrypt renewal challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name sbahn.cloud;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/sbahn.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sbahn.cloud/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Landing page (aboutme) ───
    # Redirect /aboutme to /aboutme/
    location = /aboutme {
        return 301 /aboutme/;
    }

    location ^~ /aboutme/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /aboutme/index.html;
    }

    # ─── DayBrief dashboard proxy ───
    location ^~ /daybrief/ {
        proxy_pass http://daybrief-dashboard/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── BitcoinAuto dashboard (legacy) proxy ───
    location ^~ /bitcoinauto/ {
        proxy_pass http://bitcoinauto-dashboard/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── JunsCave RPG proxy ───
    location ^~ /junscave/ {
        proxy_pass http://host.docker.internal:8082/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── BitcoinAuto Platform API ───
    location ^~ /api/ {
        proxy_pass http://host.docker.internal:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── BitcoinAuto Platform health check ───
    location = /health {
        proxy_pass http://host.docker.internal:4000;
    }

    # ─── BitcoinAuto Platform (Next.js) — root ───
    location / {
        proxy_pass http://host.docker.internal:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}